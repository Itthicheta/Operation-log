<style>

  .tabs { display:flex; gap:6px; margin:8px 0 16px; flex-wrap:wrap; }
  .tabs button { flex:1; min-width:120px; padding:10px 8px; border:1px solid var(--line);
                 background:var(--card); border-radius:10px; font-size:14px; cursor:pointer; }

  .subtabs button { padding:7px 12px; border:1px solid var(--line); background:var(--card);
                    border-radius:99px; font-size:13px; cursor:pointer; }
  .subtabs button.on { background:#1a4e8a; color:#fff; border-color:#1a4e8a; }
  .stabs { display:flex; gap:6px; margin:0 0 14px; flex-wrap:wrap; }
  .stabs button { padding:7px 14px; border:1px solid var(--line); background:var(--card);
                  border-radius:8px; font-size:13px; cursor:pointer; }
  .stabs button.on { background:var(--ink); color:#fff; border-color:var(--ink); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
          padding:14px; margin-bottom:10px; }
  .card.click { cursor:pointer; }
  .card.click:active { background:#fafbfc; }
  .cardrow { display:flex; gap:10px; align-items:center; }
  .cardrow .grow { flex:1; min-width:0; }
  .checkbtn { flex:none; width:44px; height:44px; border-radius:50%; border:2px solid var(--brand);
              background:#e6f4ec; color:var(--brand); font-size:20px; cursor:pointer; }

  .chip.warn { background:#fdecea; color:var(--warn); font-weight:600; }
  .chip.amber { background:#fff3d6; color:var(--amber); font-weight:600; }
  .chip.ok { background:#e6f4ec; color:var(--brand); font-weight:600; }

  .btn { display:inline-block; padding:10px 16px; border-radius:10px; border:1px solid var(--line);

  form.panel { background:var(--card); border:1px solid var(--line); border-radius:12px;
               padding:14px; margin-bottom:16px; }
  form.panel label, .modal form label { display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
  form.panel input, form.panel textarea, form.panel select,

  .chip .dot { vertical-align:-1px; }
  .overlay { position:fixed; inset:0; background:rgba(20,28,36,.5); display:flex;

  .modal { background:var(--card); border-radius:14px; padding:18px; width:100%;

async function api(path, opts = {}) {
  const { data: { session } } = await sb.auth.getSession();
  opts.headers = Object.assign({}, opts.headers);
  if (session) opts.headers["Authorization"] = "Bearer " + session.access_token;
  if (opts.body) opts.headers["Content-Type"] = "application/json";
  const res = await fetch(API + path, opts);
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || "Request failed.");
  return body;
}

  return String(s ?? "")

    .replace(/"/g, "&quot;");
}

const LOGIN_DOMAIN = "@mamapook.local";

function toLoginEmail(input) {
  const v = input.trim();
  if (!v) return v;
  return v.includes("@") ? v : v.toLowerCase() + LOGIN_DOMAIN;
}

        <div class="error" id="err"></div>

      </form>

  el("langBtn").onclick = () => setLang(LANG === "th" ? "en" : "th");
  el("loginForm").onsubmit = async (e) => {
    e.preventDefault();

// ---------------- shared rendering ----------------

function metaLine(item) {
  let dates = t("posted") + " " + fmtDate(item.created_at);
  if (item.done_at) dates += " · " + t("tickedOn") + " " + fmtDate(item.done_at);
  if (item.closed_at) dates += " · " + t("closedOn") + " " + fmtDate(item.closed_at);
  return dates;
}

function deadlineChip(item) {
  if (!item.deadline || item.status !== "open") return "";
  const od = isOverdue(item.deadline);
  return `<span class="chip${od ? " warn" : ""}">${t("deadline")} ${esc(fmtDate(item.deadline))}${od ? " — " + t("overdue") : ""}</span>`;
}

function card(item, actionsHtml, extraChips) {
  let chips = "";
  if (state.profile.role === "area_manager") {
    chips += `<span class="chip branch">${esc(item.branch_name)}</span>`;
  }
  chips += extraChips || "";
  chips += deadlineChip(item);
  return `<div class="card"><div>${chips}</div><h3>${esc(item.title)}</h3>` +
    (item.details ? `<p class="details">${esc(item.details)}</p>` : "") +
    `<div class="meta">${metaLine(item)}</div>` +
    (actionsHtml ? `<div class="row" style="margin-top:10px">${actionsHtml}</div>` : "") +
    `</div>`;
}

  document.querySelectorAll("[data-btab]").forEach((b) => {
    b.onclick = () => { state.mBranch = b.getAttribute("data-btab"); renderApp(); };

  document.querySelectorAll("[data-rstab]").forEach((b) => {

  document.querySelectorAll("[data-ropen]").forEach((b) => {

  document.querySelectorAll("[data-bstab]").forEach((b) => {

  });
  document.querySelectorAll("[data-bqstab]").forEach((b) => {
    b.onclick = () => { state.bqStatus = b.getAttribute("data-bqstab"); renderApp(); };
  });
  document.querySelectorAll("[data-bopen]").forEach((b) => {

  document.querySelectorAll("[data-vtab]").forEach((b) => {

  });
  document.querySelectorAll("[data-sbtab]").forEach((b) => {
    b.onclick = () => { state.schedBranch = b.getAttribute("data-sbtab"); renderApp(); };

// ---------------- manager: branches dashboard ----------------
// Month picker (default: current month, filters by item creation date),
// per-branch stat tables (tasks + requests: on-going / done / total),
// grouped bar chart of monthly totals at the bottom.
// Chart series colors are a CVD-validated categorical pair.
const CHART_TASKS = "#2a78d6";
const CHART_REQS = "#008300";

function monthOptions() {
  const s = new Set([todayStr().substring(0, 7)]);
  state.items.forEach((i) => s.add(String(i.created_at).substring(0, 7)));
  return [...s].sort().reverse();
}

function monthLabel(ym) {
  const [y, m] = ym.split("-").map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString(
    LANG === "th" ? "th-TH" : "en-US", { month: "long", year: "numeric" });
}

function viewMgrBranches() {
  if (!state.statMonth) state.statMonth = todayStr().substring(0, 7);
  const monthSel = `<div class="filter"><select id="monthSel">
    ${monthOptions().map((m) =>
      `<option value="${m}"${m === state.statMonth ? " selected" : ""}>${monthLabel(m)}</option>`).join("")}
  </select></div>`;

  const monthItems = state.items.filter((i) =>
    String(i.created_at).substring(0, 7) === state.statMonth);

  const statRow = (label, arr) => {
    const ongoing = arr.filter((i) => i.status !== "closed").length;
    const done = arr.length - ongoing;
    return `<tr><td>${label}</td><td>${ongoing}</td><td>${done}</td><td>${arr.length}</td></tr>`;
  };

  const cards = state.branches.length
    ? state.branches.map((b) => {
        const mine = monthItems.filter((i) => i.branch_id === b.id);
        const tasks = mine.filter((i) => i.kind === "problem");
        const reqs = mine.filter((i) => i.kind === "request");
        return `<div class="card"><h3>${esc(b.name)}</h3>
          <table class="stat">
            <tr><th></th><th>${t("ongoing")}</th><th>${t("completedChip")}</th><th>${t("total")}</th></tr>
            ${statRow(t("tasksForBranches"), tasks)}
            ${statRow(t("branchRequests"), reqs)}
          </table>
        </div>`;
      }).join("")
    : `<div class="empty">${t("nothing")}</div>`;

  const chartRows = state.branches.map((b) => ({
    name: b.name,
    tasks: monthItems.filter((i) => i.branch_id === b.id && i.kind === "problem").length,
    reqs: monthItems.filter((i) => i.branch_id === b.id && i.kind === "request").length,
  }));

  return monthSel + cards +
    `<div class="sec">${t("chartTitle")} — ${monthLabel(state.statMonth)}</div>
     <div class="card">
       <div style="margin-bottom:8px">
         <span class="lg"><i style="background:${CHART_TASKS}"></i>${t("tasksForBranches")}</span>
         <span class="lg"><i style="background:${CHART_REQS}"></i>${t("branchRequests")}</span>
       </div>
       ${barChart(chartRows)}
     </div>`;
}

function barChart(rows) {
  if (!rows.length) return `<div class="empty">${t("nothing")}</div>`;
  const H = 190, padT = 12, padB = 26, padL = 26, groupW = 74, barW = 24, gap = 2;
  const W = padL + rows.length * groupW + 10;
  const plotH = H - padT - padB;
  const maxV = Math.max(1, ...rows.map((r) => Math.max(r.tasks, r.reqs)));
  const step = Math.max(1, Math.ceil(maxV / 4));
  const top = step * Math.ceil(maxV / step);
  const y = (v) => padT + plotH * (1 - v / top);

  let grid = "";
  for (let v = 0; v <= top; v += step) {
    grid += `<line x1="${padL}" y1="${y(v)}" x2="${W - 4}" y2="${y(v)}"
               stroke="#e3e7ec" stroke-width="1"/>
             <text x="${padL - 6}" y="${y(v) + 4}" text-anchor="end"
               font-size="11" fill="#68737f">${v}</text>`;
  }

  const bar = (x, v, color, tip) => {
    if (v <= 0) return "";
    const yv = y(v), yb = y(0);
    const r = Math.min(4, (yb - yv) / 2);
    return `<path d="M${x},${yb} L${x},${yv + r} Q${x},${yv} ${x + r},${yv}
        L${x + barW - r},${yv} Q${x + barW},${yv} ${x + barW},${yv + r} L${x + barW},${yb} Z"
        fill="${color}" class="barhit" data-tip="${esc(tip)}"/>`;
  };

  let bars = "", labels = "";
  rows.forEach((rw, i) => {
    const x0 = padL + i * groupW + (groupW - (2 * barW + gap)) / 2;
    bars += bar(x0, rw.tasks, CHART_TASKS, `${rw.name} · ${t("tasksForBranches")}: ${rw.tasks}`);
    bars += bar(x0 + barW + gap, rw.reqs, CHART_REQS, `${rw.name} · ${t("branchRequests")}: ${rw.reqs}`);
    labels += `<text x="${padL + i * groupW + groupW / 2}" y="${H - 8}" text-anchor="middle"
                 font-size="11" fill="#68737f">${esc(rw.name)}</text>`;
  });

  return `<div><svg viewBox="0 0 ${W} ${H}"
      style="width:100%;height:auto;display:block">
    ${grid}
    <line x1="${padL}" y1="${y(0)}" x2="${W - 4}" y2="${y(0)}" stroke="#68737f" stroke-width="1"/>
    ${bars}${labels}
  </svg></div>`;
}

function bindChartTips() {
  const tip = el("tip");
  document.querySelectorAll(".barhit").forEach((p) => {
    p.addEventListener("pointerenter", () => { tip.textContent = p.getAttribute("data-tip"); tip.style.display = "block"; });
    p.addEventListener("pointermove", (e) => { tip.style.left = (e.clientX + 12) + "px"; tip.style.top = (e.clientY - 30) + "px"; });
    p.addEventListener("pointerleave", () => { tip.style.display = "none"; });
  });
}

  return (state.events || []).filter((e) => e.status === "active");

  const isMgr = state.profile.role === "area_manager";

  const catTabsHtml = `<div class="subtabs">` +
    `<button data-ctab="all" class="${allCatsOn ? "on" : ""}">${t("all")}</button>` +
    CATS.map((c) => {
      const on = state.schedCats.includes(c);
      const style = on
        ? ` style="background:${CAT_COLOR[c]}26;border-color:${CAT_COLOR[c]};color:var(--ink);font-weight:600"`
        : "";
      return `<button data-ctab="${c}"${style}><i class="dot" style="background:${CAT_COLOR[c]}"></i>${catLabel(c)}</button>`;
    }).join("") + `</div>`;

  const viewTabsHtml = `<div class="stabs">
    <button data-vtab="cal" class="${state.schedView === "cal" ? "on" : ""}">${t("calView")}</button>
    <button data-vtab="row" class="${state.schedView === "row" ? "on" : ""}">${t("rowView")}</button>
  </div>`;

  const shown = schedFiltered();
  const body = state.schedView === "row" ? schedRowView(shown) : schedCalView(shown);

  const addBtn = isMgr
    ? `<div class="row" style="margin-bottom:14px"><button class="btn primary" id="addEventBtn">${t("addEvent")}</button></div>`
    : "";

  return addBtn + monthSel + branchTabsHtml + catTabsHtml + viewTabsHtml + body;
}

function schedCalView(evs) {
  const [y, m] = state.schedMonth.split("-").map(Number);
  const startDow = new Date(y, m - 1, 1).getDay();
  const daysIn = new Date(y, m, 0).getDate();
  const byDay = {};
  evs.forEach((e) => {
    const d = Number(String(e.event_date).substring(8, 10));
    (byDay[d] = byDay[d] || []).push(e);
  });
  const today = todayStr();

  let cells = t("days").map((d) => `<div class="dh">${d}</div>`).join("");
  for (let i = 0; i < startDow; i++) cells += `<div class="day blank"></div>`;
  for (let d = 1; d <= daysIn; d++) {
    const dstr = state.schedMonth + "-" + String(d).padStart(2, "0");
    const dayEvs = byDay[d] || [];
    const isToday = dstr === today;
    let inner = `<div class="dnum">${d}</div>`;
    dayEvs.slice(0, 3).forEach((e) => {
      inner += `<div class="ev" style="background:${CAT_COLOR[e.category]}26;border-left:3px solid ${CAT_COLOR[e.category]}">${esc(e.title)}</div>`;
    });
    if (dayEvs.length > 3) inner += `<div class="more">+${dayEvs.length - 3}</div>`;
    cells += `<div class="day${dayEvs.length ? " has" : ""}${isToday ? " today" : ""}"${dayEvs.length ? ` data-dopen="${dstr}"` : ""}>${inner}</div>`;
  }
  return `<div class="cal">${cells}</div>`;
}

function schedRowView(evs) {
  if (!evs.length) return `<div class="empty">${t("nothing")}</div>`;
  const isMgr = state.profile.role === "area_manager";
  const byDate = {};
  evs.forEach((e) => {
    const d = String(e.event_date).substring(0, 10);
    (byDate[d] = byDate[d] || []).push(e);
  });
  return Object.keys(byDate).sort().map((d) =>
    `<div class="sec">${dayLabel(d)}</div>` +
    byDate[d].map((e) =>
      `<div class="card click" data-eopen="${e.id}">
        <div>${catChip(e.category)}${isMgr ? `<span class="chip branch">${esc(e.branch_name)}</span>` : ""}</div>
        <h3>${esc(e.title)}</h3>
        ${e.details ? `<p class="details">${esc(e.details)}</p>` : ""}
      </div>`).join("")
  ).join("");
}

function eventModalBody(e) {
  const isMgr = state.profile.role === "area_manager";
  return `<div>${catChip(e.category)}${isMgr ? `<span class="chip branch">${esc(e.branch_name)}</span>` : ""}</div>` +
    `<h3>${esc(e.title)}</h3>` +
    (e.details ? `<p class="details">${esc(e.details)}</p>` : "") +
    `<div class="meta">${dayLabel(String(e.event_date).substring(0, 10))}</div>`;
}

function openEventModal(id) {
  const e = (state.events || []).find((x) => x.id === id);
  if (!e) return;
  const isMgr = state.profile.role === "area_manager";
  openModal(eventModalBody(e) +
    (isMgr
      ? `<div class="row" style="margin-top:16px"><button class="btn danger" id="evCancel">${t("cancelEvent")}</button></div>`
      : ""));
  if (isMgr) {
    el("evCancel").onclick = () =>
      confirmModal(t("confirmCancel"),
        () => cancelEvent(id),
        () => openEventModal(id));
  }
}

function openDayModal(dstr) {
  const isMgr = state.profile.role === "area_manager";
  const dayEvs = schedFiltered().filter((e) => String(e.event_date).substring(0, 10) === dstr);
  if (!dayEvs.length) return;
  openModal(
    `<h3>${dayLabel(dstr)}</h3>` +
    dayEvs.map((e) =>
      `<div class="card" style="margin-top:10px">
        <div>${catChip(e.category)}${isMgr ? `<span class="chip branch">${esc(e.branch_name)}</span>` : ""}</div>
        <h3 style="font-size:15px">${esc(e.title)}</h3>
        ${e.details ? `<p class="details">${esc(e.details)}</p>` : ""}
        ${isMgr ? `<div class="row" style="margin-top:8px"><button class="btn danger subtle" data-evcancel="${e.id}" data-evday="${dstr}">${t("cancelEvent")}</button></div>` : ""}
      </div>`).join(""));
  document.querySelectorAll("[data-evcancel]").forEach((b) => {
    b.onclick = () => {
      const id = b.getAttribute("data-evcancel");
      const day = b.getAttribute("data-evday");
      confirmModal(t("confirmCancel"),
        () => cancelEvent(id),
        () => openDayModal(day));
    };
  });
}

function cancelEvent(id) {
  api("/api/events/" + id + "/cancel", { method: "POST" })
    .then(() => { toast(t("canceledToast")); loadApp(); })
    .catch((e) => toast(e.message));
}

function openAddEventModal() {
  openModal(
    `<h3>${t("addEventTitle")}</h3>
     <form id="newEvent">
       <label>${t("branchLabel")}</label>
       <select id="eBranch" required>
         ${state.branches.map((b) => `<option value="${b.id}">${esc(b.name)}</option>`).join("")}
       </select>
       <label>${t("category")}</label>
       <select id="eCat" required>
         ${CATS.map((c) => `<option value="${c}">${catLabel(c)}</option>`).join("")}
       </select>
       <label>${t("whatEvent")}</label><input id="eTitle" required maxlength="200">
       <label>${t("detailsOpt")}</label><textarea id="eDetails"></textarea>
       <label>${t("eventDate")}</label><input id="eDate" type="date" value="${todayStr()}" required>
       <div style="margin-top:14px">
         <button class="btn primary" style="width:100%" type="submit">${t("postEvent")}</button>
       </div>
     </form>`);
  el("newEvent").onsubmit = (ev) => {
    ev.preventDefault();
    api("/api/events", {
      method: "POST",
      body: JSON.stringify({
        branch_id: el("eBranch").value,
        category: el("eCat").value,
        title: el("eTitle").value,
        details: el("eDetails").value,
        event_date: el("eDate").value,
      }),
    }).then(() => { closeModal(); toast(t("eventAdded")); loadApp(); })
      .catch((err) => toast(err.message));
  };
}

// ---------------- branch views ----------------
// Same format as the manager's screens: status tabs with counts, clickable
// cards (✓ button on the ones needing this branch's action), action windows
// with Yes/No confirm on the irreversible step, logs below.

function branchStatusChip(item) {
  return item.status === "done"
    ? `<span class="chip ok">${t("doneStatus")}</span>`
    : `<span class="chip warn">${t("todoChip")}</span>`;
}

function branchTaskCard(item) {
  const check = item.status === "open" ? `<button class="checkbtn">✓</button>` : "";
  return `<div class="card click" data-bopen="${item.id}">
    <div class="cardrow">
      <div class="grow">
        <div>${branchStatusChip(item)}${deadlineChip(item)}</div>
        <h3>${esc(item.title)}</h3>
        ${item.details ? `<p class="details">${esc(item.details)}</p>` : ""}
        <div class="meta">${metaLine(item)}</div>
      </div>
      ${check}
    </div>
  </div>`;
}

function viewBranchTodo() {
  const probs = state.items.filter((i) => i.kind === "problem");
  const active = probs.filter((i) => i.status !== "closed");
  const nOpen = active.filter((i) => i.status === "open").length;
  const sTabs = [
    ["all", t("all"), active.length],
    ["open", t("todoChip"), nOpen],
    ["done", t("doneStatus"), active.length - nOpen],
  ];
  const statusTabsHtml = `<div class="stabs">` + sTabs.map(([k, label, n]) =>
    `<button data-bstab="${k}" class="${state.bStatus === k ? "on" : ""}">${label} (${n})</button>`
  ).join("") + `</div>`;

  const shown = active.filter((i) => state.bStatus === "all" || i.status === state.bStatus);
  const list = shown.length ? shown.map(branchTaskCard).join("") : `<div class="empty">${t("nothing")}</div>`;
  const solved = probs.filter((i) => i.status === "closed");

  return statusTabsHtml + list +
    logSection(t("solvedLog"), solved, (i) =>
      card(i, "", `<span class="chip ok">${t("solvedChip")}</span>`));
}

function openBranchTaskModal(id) {
  const i = state.items.find((x) => x.id === id);
  if (!i) return;
  const isOpen = i.status === "open";
  openModal(
    `<div>${branchStatusChip(i)}${deadlineChip(i)}</div>` +
    `<h3>${esc(i.title)}</h3>` +
    (i.details ? `<p class="details">${esc(i.details)}</p>` : "") +
    `<div class="meta">${metaLine(i)}</div>` +
    (isOpen
      ? `<div class="row" style="margin-top:16px">
           <button class="btn primary" id="bDone">${t("doneBtn")}</button>
         </div>`
      : `<div class="meta" style="margin-top:14px">${t("waitingCheck")}</div>`)
  );
  if (isOpen) {
    el("bDone").onclick = () =>
      confirmModal(t("confirmDone"),
        () => setStatus(id, "done", t("waitingCheck")),
        () => openBranchTaskModal(id));
  }
}

function branchReqChip(item) {
  return item.status === "done"
    ? `<span class="chip ok">${t("providedChip")}</span>`
    : `<span class="chip">${t("waitMgrChip")}</span>`;
}

function branchReqCard(item) {
  const check = item.status === "done" ? `<button class="checkbtn">✓</button>` : "";
  return `<div class="card click" data-bqopen="${item.id}">
    <div class="cardrow">
      <div class="grow">
        <div>${branchReqChip(item)}${deadlineChip(item)}</div>
        <h3>${esc(item.title)}</h3>
        ${item.details ? `<p class="details">${esc(item.details)}</p>` : ""}
        <div class="meta">${metaLine(item)}</div>
      </div>
      ${check}
    </div>
  </div>`;
}

function viewBranchAsks() {
  const reqs = state.items.filter((i) => i.kind === "request");
  const active = reqs.filter((i) => i.status !== "closed");
  const nOpen = active.filter((i) => i.status === "open").length;
  const sTabs = [
    ["all", t("all"), active.length],
    ["open", t("waitMgrChip"), nOpen],
    ["done", t("providedChip"), active.length - nOpen],
  ];
  const statusTabsHtml = `<div class="stabs">` + sTabs.map(([k, label, n]) =>
    `<button data-bqstab="${k}" class="${state.bqStatus === k ? "on" : ""}">${label} (${n})</button>`
  ).join("") + `</div>`;

  const shown = active.filter((i) => state.bqStatus === "all" || i.status === state.bqStatus);
  const list = shown.length ? shown.map(branchReqCard).join("") : `<div class="empty">${t("nothing")}</div>`;
  const closed = reqs.filter((i) => i.status === "closed");

  return `<div class="row" style="margin-bottom:14px">
      <button class="btn primary" id="addReqBtn">${t("addRequest")}</button>
    </div>` +
    statusTabsHtml + list +
    logSection(t("completedLog"), closed, (i) =>
      card(i, "", `<span class="chip ok">${t("completedChip")}</span>`));
}

function openBranchReqModal(id) {
  const i = state.items.find((x) => x.id === id);
  if (!i) return;
  const isProvided = i.status === "done";
  openModal(
    `<div>${branchReqChip(i)}${deadlineChip(i)}</div>` +
    `<h3>${esc(i.title)}</h3>` +
    (i.details ? `<p class="details">${esc(i.details)}</p>` : "") +
    `<div class="meta">${metaLine(i)}</div>` +
    (isProvided
      ? `<div class="row" style="margin-top:16px">
           <button class="btn primary" id="bRecv">${t("receivedBtn")}</button>
           <button class="btn danger" id="bNotRecv">${t("notReceived")}</button>
         </div>`
      : `<div class="meta" style="margin-top:14px">${t("waitingManager")}</div>`)
  );
  if (isProvided) {
    el("bRecv").onclick = () =>
      confirmModal(t("confirmReceived"),
        () => setStatus(id, "closed", t("receivedToast")),
        () => openBranchReqModal(id));
    el("bNotRecv").onclick = () => {
      closeModal();
      setStatus(id, "open", t("notReceivedToast"));
    };
  }
}

function openAddRequestModal() {
  openModal(
    `<h3>${t("askTitle")}</h3>
     <form id="newRequest">
       <label>${t("whatNeed")}</label><input id="rTitle" required maxlength="200">
       <label>${t("detailsOpt")}</label><textarea id="rDetails"></textarea>
       <label>${t("neededBy")}</label><input id="rDeadline" type="date" value="${todayStr()}">
       <div style="margin-top:14px">
         <button class="btn primary" style="width:100%" type="submit">${t("sendRequest")}</button>
       </div>
     </form>`
  );
  el("newRequest").onsubmit = submitNewRequest;
}

function submitNewRequest(e) {
  e.preventDefault();
  api("/api/items", {
    method: "POST",
    body: JSON.stringify({
      kind: "request",
      branch_id: state.profile.branch_id,
      title: el("rTitle").value,
      details: el("rDetails").value,
      deadline: el("rDeadline").value || null,
    }),
  }).then(() => { closeModal(); toast(t("requestSent")); loadApp(); })
    .catch((err) => toast(err.message));
}

// ---------------- boot ----------------

document.documentElement.lang = LANG;
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) loadApp();
  else renderLogin();
});
</script>
</body>
